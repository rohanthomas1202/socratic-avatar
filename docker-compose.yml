version: "3.8"

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8050:8050"
    env_file:
      - .env
    volumes:
      - ./server:/app/server
    command: uvicorn main:app --host 0.0.0.0 --port 8050 --reload
    working_dir: /app/server

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "8060:8060"
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8050
    volumes:
      - ./client:/app/client
      - /app/client/node_modules
    command: npm run dev
    working_dir: /app/client
    depends_on:
      - server
